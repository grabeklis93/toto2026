<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Toto 2026 🏒</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f9f9f7;color:#1a1a18;min-height:100vh}
#app{max-width:720px;margin:0 auto;padding:1rem}
.nav{display:flex;border-bottom:1px solid #e0ddd5;margin-bottom:1.2rem;overflow-x:auto}
.nb{padding:7px 13px;font-size:13px;white-space:nowrap;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;color:#888;margin-bottom:-1px;font-weight:400}
.nb.on{color:#1a1a18;border-bottom-color:#1a1a18;font-weight:700}
.card{background:#fff;border:0.5px solid #e0ddd5;border-radius:10px;padding:.9rem 1.1rem;margin-bottom:.9rem}
.met-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:7px;margin-bottom:.9rem}
.met{background:#f5f5f3;border-radius:8px;padding:9px 12px}
.met .ml{font-size:11px;color:#888;margin-bottom:2px}
.met .mv{font-size:19px;font-weight:700}
.pos{color:#0a6644}.neg{color:#991f1f}
input,select,textarea{width:100%;padding:7px 10px;font-size:13px;border:0.5px solid #ccc;border-radius:7px;background:#fff;color:#1a1a18;font-family:inherit;box-sizing:border-box}
textarea{resize:vertical;min-height:48px}
.fg{margin-bottom:9px}
.fl{font-size:12px;color:#888;display:block;margin-bottom:3px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
button.btn{padding:6px 14px;font-size:13px;border-radius:7px;cursor:pointer;border:0.5px solid #ccc;background:transparent;color:#1a1a18}
button.btn.pri{background:#1a1a18;color:#fff;border:none}
button.btn.sm{padding:3px 9px;font-size:12px}
button.btn.red{color:#991f1f;border-color:#f2b8b8}
.badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;display:inline-block}
.chip-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}
.chip{padding:4px 11px;border-radius:16px;font-size:12px;border:0.5px solid #ccc;cursor:pointer;background:transparent;color:#888}
.chip.on{background:#1a1a18;color:#fff;border-color:transparent}
.day-chip{padding:4px 10px;border-radius:16px;font-size:11px;border:0.5px solid #ccc;cursor:pointer;background:#fff;color:#666;margin-right:4px;margin-bottom:4px;white-space:nowrap}
.day-chip.on{background:#1a1a18;color:#fff;border-color:transparent}
.day-chip.today{background:#EFF8FF;color:#0a5e99;border-color:#90c9f0}
.bet-row{padding:9px 0;border-top:0.5px solid #e0ddd5}
.bet-row:first-child{border-top:none;padding-top:0}
.ipi{position:relative;display:inline-block}
.ipi img{width:64px;height:46px;object-fit:cover;border-radius:4px;border:0.5px solid #e0ddd5}
.idel{position:absolute;top:-4px;right:-4px;width:15px;height:15px;border-radius:50%;background:#991f1f;color:#fff;border:none;cursor:pointer;font-size:9px}
.drop{border:1.5px dashed #ccc;border-radius:8px;padding:14px;text-align:center;cursor:pointer;font-size:13px;color:#888;margin-bottom:7px}
.aibox{background:#f5f5f3;border-radius:7px;padding:9px 11px;font-size:12px;white-space:pre-wrap;margin-bottom:7px;color:#444;line-height:1.5}
.st-row{display:flex;border:0.5px solid #ccc;border-radius:7px;overflow:hidden;margin-bottom:12px}
.st-btn{flex:1;padding:6px 2px;font-size:11px;border:none;cursor:pointer;background:#fff;color:#888}
.toast{position:fixed;bottom:10px;right:10px;font-size:11px;padding:5px 10px;border-radius:7px;background:#fff;border:0.5px solid #e0ddd5;z-index:999;display:none}
.lb{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.82);z-index:9999;align-items:center;justify-content:center;padding:20px}
.lb.on{display:flex}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:7px 8px;font-size:11px;color:#888;font-weight:600;text-align:right;border-bottom:0.5px solid #e0ddd5;white-space:nowrap;background:#f7f6f3}
th:first-child{text-align:left}
td{padding:8px;text-align:right;border-bottom:0.5px solid #f0ede8;white-space:nowrap}
td:first-child{text-align:left}
</style>
</head>
<body>
<div id="app"><div id="nav" class="nav"></div><div id="content"></div>
  </div>
<div class="toast" id="toast"></div>
<div class="lb" id="lb" onclick="closeLB()"><img id="lbimg" src="" style="max-width:100%;max-height:90vh;border-radius:4px"></div>

<script>
const KEY = "toto26";
const PROXY = "https://toto-proxy.onrender.com";

const IIHF_DAYS = [
  "15.05 – Diena 1","16.05 – Diena 2","17.05 – Diena 3","18.05 – Diena 4",
  "19.05 – Diena 5","20.05 – Diena 6","21.05 – Diena 7","22.05 – Diena 8",
  "23.05 – Diena 9","24.05 – Diena 10","25.05 – Diena 11",
  "27.05 – Ceturtdaļfināli","29.05 – Pusfināli","31.05 – Fināls",
  "📌 Long-term likmes"
];

const PC = {
  "Gačo":   {bg:"#DBEAFE",c:"#1d4ed8"},
  "Igo":    {bg:"#FED7AA",c:"#c2410c"},
  "Peksis": {bg:"#D1FAE5",c:"#065f46"},
  "Sauskis":{bg:"#E5E7EB",c:"#374151"}
};

const SS = {
  "Atvērts":      {bg:"#f5f5f3",c:"#888"},
  "Uzvarēts":     {bg:"#E1F5EE",c:"#085041"},
  "Zaudēts":      {bg:"#FCEBEB",c:"#791F1F"},
  "Live uzvarēts":{bg:"#E1F5EE",c:"#0F6E56",border:"0.5px solid #5DCAA5"},
  "Live zaudēts": {bg:"#FAECE7",c:"#712B13",border:"0.5px solid #F0997B"}
};

let S = {players:["Gačo","Igo","Peksis","Sauskis"],days:IIHF_DAYS,bets:[]};
let tab = "diena";
let curDay = todayDay();
let curPl = "Visi";
let me = localStorage.getItem("toto_me") || "Gačo";
let editIdx = null;
let imgs = [];
let ldrDay = "Kopējais";

// form state
let fPl = me, fDy = curDay, fGame = "", fBet = "", fSum = "", fKoef = "", fSt = "Atvērts", fAiTxt = "";

function todayDay() {
  const d = new Date(), m = d.getMonth()+1, day = d.getDate();
  if (m !== 5) return IIHF_DAYS[0];
  if (day >= 15 && day <= 25) return IIHF_DAYS[day-15];
  if (day === 27) return "27.05 – Ceturtdaļfināli";
  if (day === 29) return "29.05 – Pusfināli";
  if (day === 31) return "31.05 – Fināls";
  return IIHF_DAYS[0];
}

function calcPL(b) {
  if (b.status==="Uzvarēts"||b.status==="Live uzvarēts") return +((b.sum||0)*((b.koef||1)-1)).toFixed(2);
  if (b.status==="Zaudēts"||b.status==="Live zaudēts") return -(b.sum||0);
  return 0;
}
function isLive(s) { return s==="Live uzvarēts"||s==="Live zaudēts"; }

function showToast(m) {
  const t = document.getElementById("toast");
  t.textContent = m; t.style.display = "block";
  clearTimeout(t._t); t._t = setTimeout(()=>t.style.display="none", 2200);
}

function persist(d) {
  try { localStorage.setItem(KEY, JSON.stringify(d)); } catch {}
  fetch(PROXY+"/data", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)})
    .then(()=>showToast("✓ Saglabāts")).catch(()=>showToast("✓ Lokāli"));
}

function upd(d) { S = d; persist(d); render(); }

function openLB(src) { document.getElementById("lbimg").src=src; document.getElementById("lb").classList.add("on"); }
function closeLB() { document.getElementById("lb").classList.remove("on"); }

// ── RENDER ──
function render() {
  renderNav();
  const c = document.getElementById("content");
  if (tab==="diena") c.innerHTML = renderDiena();
  else if (tab==="add") c.innerHTML = renderAdd();
  else if (tab==="leader") c.innerHTML = renderLeader();
  else if (tab==="cfg") c.innerHTML = renderCfg();
  attachEvents();
}

function renderNav() {
  const tabs = [["diena","Šodienas likmes"],["add","+ Likme"],["leader","Leaderboard"],["cfg","⚙"]];
  document.getElementById("nav").innerHTML = tabs.map(([k,l])=>
    `<button class="nb${tab===k?" on":""}" onclick="goTab('${k}')">${l}</button>`
  ).join("");
}

function goTab(t) { tab=t; if(t==="add"){ fPl=me; fDy=curDay; } render(); }

function met(label, val, color) {
  return `<div class="met"><div class="ml">${label}</div><div class="mv${color?" "+color:""}">${val}</div></div>`;
}

function betCard(b, idx) {
  const p2 = calcPL(b);
  const ss = SS[b.status]||SS["Atvērts"];
  const pc = PC[b.player]||{bg:"#f5f5f3",c:"#888"};
  const title = b.game||(b.bet?b.bet.split("\n")[0]:"—");
  const plBadge = `<span style="padding:2px 7px;border-radius:8px;font-size:11px;font-weight:600;background:${pc.bg};color:${pc.c}">${b.player}</span>`;
  const stBadge = `<span class="badge" style="background:${ss.bg};color:${ss.c};${ss.border?"border:"+ss.border:""}">${b.status}</span>`;
  const liveBadge = isLive(b.status)?`<span class="badge" style="background:#FAEEDA;color:#633806;border:0.5px solid #EF9F27;margin-left:3px">Live</span>`:"";
  const thumbs = (b.imgs||[]).map((img,i)=>`<img src="${img}" data-src="${img}" onclick="openLB(this.dataset.src)" style="width:50px;height:36px;object-fit:cover;border-radius:4px;border:0.5px solid #e0ddd5;cursor:pointer;margin-right:4px;margin-top:4px">`).join("");
  return `<div class="bet-row">
    <div style="display:flex;align-items:flex-start;gap:9px">
      <div style="flex:1">
        <div style="display:flex;align-items:baseline;gap:6px;margin-bottom:2px">
          <span style="font-size:14px;font-weight:700">${title}</span>${plBadge}
        </div>
        ${b.bet&&b.game?`<div style="font-size:12px;color:#555;margin-bottom:4px">${b.bet}</div>`:""}
        <div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap">
          ${stBadge}${liveBadge}
          <span style="font-size:11px;color:#bbb">${b.sum||0}€ @ ${b.koef||"—"}</span>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
        <div style="font-size:15px;font-weight:700;color:${p2>0?"#0a6644":p2<0?"#991f1f":"#888"}">${p2>0?"+":""}${p2.toFixed(2)}€</div>
        <div style="display:flex;gap:3px">
          <button class="btn sm" style="color:#085041;border-color:#c8edda" onclick="quickSt(${idx},1)">✓</button>
          <button class="btn sm" style="color:#791F1F;border-color:#f2b8b8" onclick="quickSt(${idx},2)">✗</button>
          <button class="btn sm" onclick="editBet(${idx})">✏</button>
          <button class="btn sm red" onclick="delBet(${idx})">🗑</button>
        </div>
      </div>
    </div>
    ${thumbs?`<div>${thumbs}</div>`:""}
  </div>`;
}

function renderDiena() {
  const todayLabel = todayDay();
  const bets = S.bets.filter(b=>b.day===curDay&&(curPl==="Visi"||b.player===curPl));
  const pl = bets.reduce((a,b)=>a+calcPL(b),0);
  const w = bets.filter(b=>calcPL(b)>0).length;
  const l = bets.filter(b=>calcPL(b)<0).length;

  const dayChips = IIHF_DAYS.map(d=>{
    const isT = d===todayLabel, sel = d===curDay;
    const cls = "day-chip"+(sel?" on":isT?" today":"");
    const label = d.includes("Long-term")?"📌 Long-term":d;
    return `<button class="${cls}" onclick="setDayIdx(${IIHF_DAYS.indexOf(d)})">${label}</button>`;
  }).join("");

  const plChips = ["Visi",...S.players].map((p,pi)=>{
    const pc = PC[p]; const sel = p===curPl;
    const bg = sel?(pc?pc.bg:"#1a1a18"):(pc?pc.bg+"88":"#fff");
    const c = sel?(pc?pc.c:"#fff"):(pc?pc.c:"#888");
    return `<button style="padding:4px 11px;border-radius:16px;font-size:12px;border:0.5px solid #ccc;cursor:pointer;margin-right:4px;margin-bottom:4px;background:${bg};color:${c};font-weight:${sel?700:500}" onclick="setPlIdx(${pi})">${p}</button>`;
  }).join("");

  const betsHtml = bets.length
    ? `<div class="card">${[...bets].reverse().map(b=>betCard(b,S.bets.indexOf(b))).join("")}</div>`
    : `<div style="color:#888;font-size:13px">Nav likmes. Nospied "+ Likme".</div>`;

  return `<div style="margin-bottom:10px"><div style="display:flex;flex-wrap:wrap;margin-bottom:8px">${dayChips}</div>${plChips}</div>
    <div class="met-grid">
      ${met("P/L",(pl>=0?"+":"")+pl.toFixed(2)+"€",pl>=0?"pos":"neg")}
      ${met("W/L",w+"/"+l)}
      ${met("Atvērti",bets.filter(b=>b.status==="Atvērts").length)}
      ${met("Ieguldīts",bets.reduce((a,b)=>a+(b.sum||0),0).toFixed(0)+"€")}
    </div>${betsHtml}`;
}

function renderAdd() {
  const plOpts = S.players.map(p=>`<option${p===fPl?" selected":""}>${p}</option>`).join("");
  const dyOpts = IIHF_DAYS.map(d=>`<option${d===fDy?" selected":""}>${d}</option>`).join("");
  const stBtns = ["Atvērts","Uzvarēts","Zaudēts","Live ✓","Live ✗"].map((l,i)=>{
    const vals=["Atvērts","Uzvarēts","Zaudēts","Live uzvarēts","Live zaudēts"];
    const v=vals[i], sel=fSt===v;
    const ss=SS[v];
    return `<button class="st-btn" style="${sel?`background:${ss.bg};color:${ss.c};font-weight:700`:""};" onclick="setStIdx(${i})">${l}</button>`;
  }).join("");

  const imgPrev = imgs.map((img,i)=>
    `<div class="ipi"><img src="${img.data}"><button class="idel" onclick="delImg(${i})">✕</button></div>`
  ).join("");

  return `<div class="card">
    <div class="r2" style="margin-bottom:9px">
      <div class="fg" style="margin:0"><label class="fl">Spēlētājs</label><select id="fPl" onchange="fPl=this.value">${plOpts}</select></div>
      <div class="fg" style="margin:0"><label class="fl">Diena</label><select id="fDy" onchange="fDy=this.value">${dyOpts}</select></div>
    </div>
    <div class="fg">
      <label class="fl">Screenshot — AI nolasīs automātiski</label>
      <div class="drop" onclick="triggerFileInput()" ondrop="onDrop(event)" ondragover="event.preventDefault()">↑ Nospied vai ievelc attēlu</div>
      <input type="file" id="fi" accept="image/*" multiple style="display:none" onchange="onFiles(this.files)">
      <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:7px">${imgPrev}</div>
      ${fAiTxt?`<div class="aibox">${fAiTxt}</div>`:""}
    </div>
    <div class="fg"><label class="fl">Spēle / notikums</label><input id="fGame" value="${fGame}" oninput="fGame=this.value" placeholder="CAN vs SUI"></div>
    <div class="fg"><label class="fl">Likme</label><textarea id="fBet" oninput="fBet=this.value" placeholder="CAN uzvar...">${fBet}</textarea></div>
    <div class="r2" style="margin-bottom:9px">
      <div><label class="fl">Summa (€)</label><input type="number" id="fSum" value="${fSum}" oninput="fSum=this.value" placeholder="5" step="0.01"></div>
      <div><label class="fl">Koeficients</label><input type="number" id="fKoef" value="${fKoef}" oninput="fKoef=this.value" placeholder="2.00" step="0.01"></div>
    </div>
    <div class="fg"><label class="fl">Statuss</label><div class="st-row">${stBtns}</div></div>
    <div style="display:flex;gap:7px;align-items:center">
      <button class="btn pri" onclick="saveBet()">Saglabāt</button>
      <button class="btn" onclick="clearForm()">Notīrīt</button>
      <span id="saveok" style="font-size:12px;color:#0a6644;display:none">✓ Saglabāts</span>
    </div>
  </div>`;
}

function renderLeader() {
  const ldrDays = ["Kopējais",...IIHF_DAYS.filter(d=>S.bets.some(b=>b.day===d))];
  const lb = ldrDay==="Kopējais"?S.bets:S.bets.filter(b=>b.day===ldrDay);

  const pst = {}; S.players.forEach(p=>{pst[p]={pl:0,w:0,l:0,n:0,si:0,mxW:-Infinity,mxL:Infinity,mxK:0};});
  lb.forEach(b=>{
    if(!pst[b.player])return;
    const p2=calcPL(b),s=pst[b.player];
    s.pl+=p2;s.si+=b.sum||0;s.n++;
    if(p2>0){s.w++;if(p2>s.mxW)s.mxW=p2;}
    if(p2<0){s.l++;if(p2<s.mxL)s.mxL=p2;}
    if((b.koef||0)>s.mxK)s.mxK=b.koef||0;
  });
  const tot={pl:0,w:0,l:0,n:0,si:0,mxW:-Infinity,mxL:Infinity,mxK:0};
  lb.forEach(b=>{const p2=calcPL(b);tot.pl+=p2;tot.si+=b.sum||0;tot.n++;if(p2>0){tot.w++;if(p2>tot.mxW)tot.mxW=p2;}if(p2<0){tot.l++;if(p2<tot.mxL)tot.mxL=p2;}if((b.koef||0)>tot.mxK)tot.mxK=b.koef||0;});

  function row(p, s, isTotal) {
    const pc=PC[p]||{bg:"#f5f5f3",c:"#555"};
    const wr=s.n?Math.round(s.w/s.n*100):0;
    const nameCell = isTotal
      ? `<span style="font-weight:700;font-size:12px;color:#888">Kopā</span>`
      : `<span style="padding:2px 8px;border-radius:8px;font-size:12px;font-weight:600;background:${pc.bg};color:${pc.c}">${p}</span>`;
    return `<tr style="background:${isTotal?"#fafaf8":"#fff"}">
      <td style="padding-left:8px">${nameCell}</td>
      <td>${s.n}</td>
      <td style="color:#085041">${s.w}</td>
      <td style="color:#791F1F">${s.l}</td>
      <td style="font-weight:600;color:${wr>=55?"#085041":wr<=35?"#791F1F":"#1a1a18"}">${wr}%</td>
      <td style="font-weight:700;color:${s.pl>=0?"#0a6644":"#991f1f"}">${s.pl>=0?"+":""}${s.pl.toFixed(2)}€</td>
      <td>${s.si.toFixed(0)}€</td>
      <td style="color:#085041">${s.mxW===-Infinity?"-":"+"+s.mxW.toFixed(2)+"€"}</td>
      <td style="color:#791F1F">${s.mxL===Infinity?"-":s.mxL.toFixed(2)+"€"}</td>
      <td>${s.mxK>0?s.mxK.toFixed(2):"-"}</td>
    </tr>`;
  }

  const dayBtns = ldrDays.map(d=>{
    const sel=d===ldrDay;
    const li=ldrDays.indexOf(d); return `<button class="day-chip${sel?" on":""}" onclick="setLdrDayIdx(${li})">${d.includes("Long-term")?"📌 Long-term":d}</button>`;
  }).join("");

  const wins=lb.filter(b=>calcPL(b)>0), losses=lb.filter(b=>calcPL(b)<0);
  const bW=wins.length?wins.reduce((a,b)=>calcPL(b)>calcPL(a)?b:a):null;
  const bL=losses.length?losses.reduce((a,b)=>calcPL(b)<calcPL(a)?b:a):null;
  const bK=lb.length?lb.reduce((a,b)=>(b.koef||0)>(a.koef||0)?b:a):null;

  function hCard(label,b,val,color) {
    if(!b)return"";
    const pc=PC[b.player]||{bg:"#f5f5f3",c:"#888"};
    return `<div style="flex:1;min-width:130px;background:#fff;border:0.5px solid #e0ddd5;border-radius:9px;padding:9px 11px">
      <div style="font-size:10px;color:#aaa;margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px">${label}</div>
      <div style="font-size:16px;font-weight:700;color:${color};margin-bottom:2px">${val}</div>
      <div style="font-size:12px;font-weight:600;margin-bottom:3px">${b.game||b.bet||"—"}</div>
      <span style="padding:1px 6px;border-radius:6px;background:${pc.bg};color:${pc.c};font-weight:600;font-size:11px">${b.player}</span>
    </div>`;
  }

  return `<div style="display:flex;flex-wrap:wrap;margin-bottom:12px">${dayBtns}</div>
    <div style="overflow-x:auto;border-radius:10px;border:0.5px solid #e0ddd5;margin-bottom:.9rem">
      <table>
        <thead><tr><th style="text-align:left;padding-left:8px">Spēlētājs</th><th>Likmes</th><th>W</th><th>L</th><th>Win%</th><th>P/L</th><th>Ieguldīts</th><th>Max win</th><th>Max loss</th><th>Max koef</th></tr></thead>
        <tbody>${S.players.map(p=>row(p,pst[p],false)).join("")}${row("Kopā",tot,true)}</tbody>
      </table>
    </div>
    ${(bW||bL||bK)?`<div style="display:flex;gap:8px;flex-wrap:wrap">
      ${hCard("Lielākais win",bW,bW?"+"+calcPL(bW).toFixed(2)+"€":"","#085041")}
      ${hCard("Lielākais loss",bL,bL?calcPL(bL).toFixed(2)+"€":"","#791F1F")}
      ${hCard("Augstākais koef",bK,bK?(bK.koef||0).toFixed(2):"","#1a1a18")}
    </div>`:""}`;
}

function renderCfg() {
  const plList = S.players.map((p,i)=>`<div style="display:flex;align-items:center;gap:7px;padding:5px 0;${i?"border-top:0.5px solid #e0ddd5":""}">
    <span style="flex:1;font-size:14px">${p}</span>
    ${S.players.length>1?`<button class="btn sm red" onclick="rmPlayer(this.dataset.p)" data-p="${p}">Dzēst</button>`:""}
  </div>`).join("");
  const actOpts = S.players.map(p=>`<option${p===me?" selected":""}>${p}</option>`).join("");
  return `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px"><span style="font-weight:700">Spēlētāji</span><button class="btn sm" onclick="showAddP()">+ Pievienot</button></div>
    ${plList}
    <div id="addpf" style="display:none;margin-top:9px"><input type="text" id="npn" placeholder="Vārds" style="margin-bottom:7px"><div style="display:flex;gap:6px"><button class="btn sm pri" onclick="addPlayer()">Pievienot</button><button class="btn sm" onclick="hideAddP()">Atcelt</button></div></div>
  </div>
  <div class="card"><div style="font-weight:700;margin-bottom:7px">Aktīvais spēlētājs (tu)</div>
    <select onchange="setMe(this.value)">${actOpts}</select>
  </div>
  <div class="card"><div style="font-weight:700;margin-bottom:9px">Dati</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px">
      <button class="btn sm" onclick="exportData()">⬇ Eksportēt JSON</button>
      <button class="btn sm" onclick="triggerImportInput()">⬆ Importēt JSON</button>
    </div>
    <input type="file" id="impf" accept=".json" style="display:none" onchange="importData(this.files[0])">
  </div>
  <div class="card" style="border-color:#f2b8b8"><div style="font-weight:700;margin-bottom:6px;color:#991f1f">Bīstamā zona</div>
    <button class="btn sm red" onclick="nukeAll()">Dzēst visas likmes</button>
  </div>`;
}

// ── ACTIONS ──
function setDay(d) { curDay=d; render(); }
function setDayIdx(i) { curDay=IIHF_DAYS[i]; render(); }
function setPlIdx(i) { const all=["Visi",...S.players]; curPl=all[i]; render(); }
function setPl(p) { curPl=p; render(); }
function setSt(v) { fSt=v; render(); }
const STATUSES_ARR=["Atvērts", "Uzvarēts", "Zaudēts", "Live uzvarēts", "Live zaudēts"];
function setStIdx(i) { fSt=STATUSES_ARR[i]; render(); }
function setLdrDay(d) { ldrDay=d; render(); }
function setLdrDayIdx(i) { const days=["Kopējais",...IIHF_DAYS.filter(d=>S.bets.some(b=>b.day===d))]; ldrDay=days[i]||"Kopējais"; render(); }
function setMe(v) { me=v; localStorage.setItem("toto_me",v); }
function quickSt(idx,s) { S.bets[idx].status=s===1?'Uzvarēts':'Zaudēts'; upd({...S}); }
function delBet(idx) { S.bets.splice(idx,1); upd({...S}); }

function editBet(idx) {
  const b=S.bets[idx]; editIdx=idx;
  fPl=b.player; fDy=b.day; fGame=b.game||""; fBet=b.bet||"";
  fSum=String(b.sum||""); fKoef=String(b.koef||""); fSt=b.status;
  imgs=b.imgs?b.imgs.map(d=>({data:d,type:"image/jpeg"})):[];
  fAiTxt=""; goTab("add");
}

function saveBet() {
  const game=(fGame||"").trim(), bet=(fBet||"").trim();
  const sum=parseFloat(fSum), koef=parseFloat(fKoef);
  if(!game&&!bet){alert("Ievadi spēli vai likmi!");return;}
  if(!sum||sum<=0){alert("Ievadi summu!");return;}
  if(!koef||koef<=1){alert("Ievadi koeficientu (>1)!");return;}
  const obj={player:fPl,day:fDy,game,bet,sum,koef,status:fSt,imgs:imgs.map(i=>i.data),ts:Date.now()};
  if(editIdx!==null){S.bets[editIdx]=obj;editIdx=null;}else S.bets.push(obj);
  upd({...S});
  const ok=document.getElementById("saveok");
  if(ok){ok.style.display="inline";setTimeout(()=>ok.style.display="none",2000);}
  clearForm();
}

function clearForm() {
  fGame="";fBet="";fSum="";fKoef="";fSt="Atvērts";imgs=[];fAiTxt="";editIdx=null;
  render();
}

function onDrop(e){e.preventDefault();onFiles(e.dataTransfer.files);}
function onFiles(files){Array.from(files).forEach(f=>{const r=new FileReader();r.onload=e=>{imgs.push({data:e.target.result,type:f.type||"image/jpeg"});runAI();render();};r.readAsDataURL(f);});}
function delImg(i){imgs.splice(i,1);render();}

async function runAI(){
  fAiTxt="AI nolasa...";render();
  try{
    const content=[{type:"text",text:`Šis ir bukmeikera likmju screenshot (OlyBet, Optibet, Betsafe vai cits).\nISO kodi: Čehija=CZE, Dānija=DEN, ASV=USA, Šveice=SUI, Zviedrija=SWE, Latvija=LAT, Kanāda=CAN, Somija=FIN, Vācija=GER, Norvēģija=NOR, Slovākija=SVK, Austrija=AUT, GBR, ITA, HUN, SLO.\nLikmes veidu tulkošana:\n- 'Match Result: [Komanda]' = [ISO] uzvar\n- 'Handicap: [Komanda] -1.5' = [ISO] -1.5 HC\n- 'Vārtu skaits Vairāk (X.X)' = Over X.X\n- 'Vārtu skaits Mazāk (X.X)' = Under X.X\n- 'Mačs 1' = mājas uzvar, 'Mačs 2' = viesi uzvar\nJa kombinētā - atdala ar ' + '.\nSumma = Stake/Likme lauks. Koeficients = Total Odds.\nAtbildi TIKAI 4 rindas:\nMačs: <ISO vs ISO>\nLikme: <īsi, piem. SUI -1.5 HC + CZE uzvar>\nSumma: <skaitlis>\nKoeficients: <skaitlis>`}];
    imgs.forEach(img=>content.push({type:"image",source:{type:"base64",media_type:img.type,data:img.data.split(",")[1]}}));
    const resp=await fetch(PROXY+"/ai",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:200,messages:[{role:"user",content}]})});
    const d=await resp.json();
    const txt=d.content?.find(c=>c.type==="text")?.text||"Neizdevās nolasīt.";
    fAiTxt=txt;
    const gm=txt.match(/Mačs:\s*(.+)/i);if(gm)fGame=gm[1].trim();
    const bm=txt.match(/Likme:\s*(.+)/i);if(bm)fBet=bm[1].trim();
    const sm=txt.match(/Summa:\s*([\d.,]+)/i);if(sm)fSum=String(parseFloat(sm[1].replace(",",".")));
    const km=txt.match(/Koeficients:\s*([\d.,]+)/i);if(km)fKoef=String(parseFloat(km[1].replace(",",".")));
  }catch(e){fAiTxt="Kļūda: "+e.message;}
  render();
}

function showAddP(){document.getElementById("addpf").style.display="block";}
function hideAddP(){document.getElementById("addpf").style.display="none";}
function addPlayer(){const n=document.getElementById("npn").value.trim();if(!n||S.players.includes(n))return;S.players.push(n);upd({...S});}
function rmPlayer(p){if(!confirm("Dzēst "+p+"?"))return;S.players=S.players.filter(x=>x!==p);upd({...S});}

function exportData(){
  const a=document.createElement("a");
  a.href="data:application/json,"+encodeURIComponent(JSON.stringify(S,null,2));
  a.download="toto2026.json";a.click();
}
function importData(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.bets&&d.players){S={...S,...d};upd({...S});showToast("✓ Importēts");}else showToast("! Nederīgs fails");}catch{showToast("! Kļūda");}};
  r.readAsText(file);
}
function nukeAll(){S.bets=[];upd({...S});}

function attachEvents(){}
function triggerFileInput(){document.getElementById('fi').click();}
function triggerImportInput(){document.getElementById('impf').click();}

// ── INIT ──
document.addEventListener('DOMContentLoaded', function() {
  try{const r=localStorage.getItem(KEY);if(r){const d=JSON.parse(r);S={...d,days:IIHF_DAYS};}}catch{}
  try {
    render();
  } catch(e) {
    document.getElementById('content').innerHTML = '<div style="padding:1rem;color:red">Kļūda: '+e.message+'</div>';
  }

fetch(PROXY+"/data").then(r=>r.json()).then(d=>{
  if(d&&d.bets&&(d.bets.length>0||!localStorage.getItem(KEY))){
    S={...d,days:IIHF_DAYS};
    localStorage.setItem(KEY,JSON.stringify(S));
    render();
  }
}).catch(()=>{});

setInterval(()=>{
  fetch(PROXY+"/data").then(r=>r.json()).then(d=>{
    if(d&&d.bets&&JSON.stringify(d.bets)!==JSON.stringify(S.bets)){
      S={...d,days:IIHF_DAYS};render();
    }
  }).catch(()=>{});
},15000);
}); // end DOMContentLoaded
</script>
</body>
</html>
