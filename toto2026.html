<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Toto 2026 🏒</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f9f9f7;color:#1a1a18;min-height:100vh}
#root{max-width:720px;margin:0 auto;padding:1rem}
</style>
</head>
<body>
<div id="root"><p style="padding:2rem;color:#888">Ielādē...</p></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;


const KEY = "toto26";

const IIHF_DAYS = [
  "15.05 – Diena 1", "16.05 – Diena 2", "17.05 – Diena 3",
  "18.05 – Diena 4", "19.05 – Diena 5", "20.05 – Diena 6",
  "21.05 – Diena 7", "22.05 – Diena 8", "23.05 – Diena 9",
  "24.05 – Diena 10", "25.05 – Diena 11",
  "27.05 – Ceturtdaļfināli", "29.05 – Pusfināli", "31.05 – Fināls",
  "📌 Long-term likmes",
];

function todayDay() {
  const d = new Date();
  const m = d.getMonth() + 1, day = d.getDate();
  if (m !== 5) return IIHF_DAYS[0];
  if (day >= 15 && day <= 25) return IIHF_DAYS[day - 15];
  if (day === 27) return "27.05 – Ceturtdaļfināli";
  if (day === 29) return "29.05 – Pusfināli";
  if (day === 31) return "31.05 – Fināls";
  return IIHF_DAYS[0];
}

const DEFAULT = { players: ["Gačo","Igo","Peksis","Sauskis"], days: IIHF_DAYS, bets: [] };

const PLAYER_COLOR = {
  "Gačo":   { bg:"#DBEAFE", color:"#1d4ed8" },
  "Igo":    { bg:"#FED7AA", color:"#c2410c" },
  "Peksis": { bg:"#D1FAE5", color:"#065f46" },
  "Sauskis":{ bg:"#E5E7EB", color:"#374151" },
};

function calcPL(b) {
  if (b.status === "Uzvarēts" || b.status === "Live uzvarēts") return +((b.sum||0)*((b.koef||1)-1)).toFixed(2);
  if (b.status === "Zaudēts"  || b.status === "Live zaudēts")  return -(b.sum||0);
  return 0;
}
function isLive(s) { return s==="Live uzvarēts"||s==="Live zaudēts"; }

const SS = {
  "Atvērts":       { background:"#f5f5f3", color:"#888" },
  "Uzvarēts":      { background:"#E1F5EE", color:"#085041" },
  "Zaudēts":       { background:"#FCEBEB", color:"#791F1F" },
  "Live uzvarēts": { background:"#E1F5EE", color:"#0F6E56", border:"0.5px solid #5DCAA5" },
  "Live zaudēts":  { background:"#FAECE7", color:"#712B13", border:"0.5px solid #F0997B" },
};

const inp  = { width:"100%", padding:"7px 10px", fontSize:13, border:"0.5px solid #ccc", borderRadius:7, background:"#fff", color:"#1a1a18", fontFamily:"inherit", boxSizing:"border-box" };
const card = { background:"#fff", border:"0.5px solid #e0ddd5", borderRadius:10, padding:".9rem 1.1rem", marginBottom:".9rem" };

function Met({ label, val, color }) {
  return (
    <div style={{ background:"#f5f5f3", borderRadius:8, padding:"9px 12px" }}>
      <div style={{ fontSize:11, color:"#888", marginBottom:2 }}>{label}</div>
      <div style={{ fontSize:19, fontWeight:700, color:color||"#1a1a18" }}>{val}</div>
    </div>
  );
}
function Btn({ onClick, pri, sm, red, children }) {
  return <button onClick={onClick} style={{ padding:sm?"3px 9px":"6px 14px", fontSize:sm?12:13, borderRadius:7, cursor:"pointer", border:pri?"none":red?"0.5px solid #f2b8b8":"0.5px solid #ccc", background:pri?"#1a1a18":"transparent", color:pri?"#fff":red?"#991f1f":"#1a1a18" }}>{children}</button>;
}
function Badge({ s }) {
  return <span style={{ padding:"2px 8px", borderRadius:10, fontSize:11, fontWeight:600, display:"inline-block", ...SS[s] }}>{s}</span>;
}


function Leaderboard({ data, ldrDay, setLdrDay }) {
  const ldrDays = ["Kopējais", ...IIHF_DAYS.filter(d => data.bets.some(b => b.day === d))];
  const ldrBets = ldrDay === "Kopējais" ? data.bets : data.bets.filter(b => b.day === ldrDay);

  const pst = {};
  data.players.forEach(p => { pst[p] = { pl:0, w:0, l:0, n:0, si:0, maxWin:-Infinity, maxLoss:Infinity, maxKoef:0 }; });
  ldrBets.forEach(b => {
    if (!pst[b.player]) return;
    const p2 = calcPL(b); const s = pst[b.player];
    s.pl += p2; s.si += b.sum||0; s.n++;
    if (p2 > 0) { s.w++; if (p2 > s.maxWin) s.maxWin = p2; }
    if (p2 < 0) { s.l++; if (p2 < s.maxLoss) s.maxLoss = p2; }
    if ((b.koef||0) > s.maxKoef) s.maxKoef = b.koef||0;
  });

  const tot = { pl:0, w:0, l:0, n:0, si:0, maxWin:-Infinity, maxLoss:Infinity, maxKoef:0 };
  ldrBets.forEach(b => {
    const p2 = calcPL(b); tot.pl += p2; tot.si += b.sum||0; tot.n++;
    if (p2 > 0) { tot.w++; if (p2 > tot.maxWin) tot.maxWin = p2; }
    if (p2 < 0) { tot.l++; if (p2 < tot.maxLoss) tot.maxLoss = p2; }
    if ((b.koef||0) > tot.maxKoef) tot.maxKoef = b.koef||0;
  });

  const thS = { padding:"7px 8px", fontSize:11, color:"#888", fontWeight:600, textAlign:"right", borderBottom:"0.5px solid #e0ddd5", whiteSpace:"nowrap" };
  const tdS = (right, bold, color) => ({ padding:"8px 8px", fontSize:13, textAlign:right?"right":"left", fontWeight:bold?700:400, color:color||"#1a1a18", borderBottom:"0.5px solid #f0ede8", whiteSpace:"nowrap" });

  function StatRow({ p, s, isTotal }) {
    const pc = PLAYER_COLOR[p] || { bg:"#f5f5f3", color:"#555" };
    const wr = s.n ? Math.round(s.w / s.n * 100) : 0;
    return (
      <tr style={{ background: isTotal ? "#fafaf8" : "#fff" }}>
        <td style={{ ...tdS(false, isTotal), paddingLeft:8 }}>
          {isTotal
            ? <span style={{ fontWeight:700, fontSize:12, color:"#888" }}>Kopā</span>
            : <span style={{ padding:"2px 8px", borderRadius:8, fontSize:12, fontWeight:600, background:pc.bg, color:pc.color }}>{p}</span>}
        </td>
        <td style={tdS(true)}>{s.n}</td>
        <td style={{ ...tdS(true), color:"#085041" }}>{s.w}</td>
        <td style={{ ...tdS(true), color:"#791F1F" }}>{s.l}</td>
        <td style={{ ...tdS(true), fontWeight:600, color:wr>=55?"#085041":wr<=35?"#791F1F":"#1a1a18" }}>{wr}%</td>
        <td style={{ ...tdS(true, true), color:s.pl>=0?"#0a6644":"#991f1f" }}>{s.pl>=0?"+":""}{s.pl.toFixed(2)}€</td>
        <td style={tdS(true)}>{s.si.toFixed(0)}€</td>
        <td style={{ ...tdS(true), color:"#085041" }}>{s.maxWin===-Infinity ? "-" : "+"+s.maxWin.toFixed(2)+"€"}</td>
        <td style={{ ...tdS(true), color:"#791F1F" }}>{s.maxLoss===Infinity ? "-" : s.maxLoss.toFixed(2)+"€"}</td>
        <td style={tdS(true)}>{s.maxKoef > 0 ? s.maxKoef.toFixed(2) : "-"}</td>
      </tr>
    );
  }

  const wins   = ldrBets.filter(b => calcPL(b) > 0);
  const losses = ldrBets.filter(b => calcPL(b) < 0);
  const bigWin   = wins.length   ? wins.reduce((a,b)   => calcPL(b)>calcPL(a)?b:a)   : null;
  const bigLoss  = losses.length ? losses.reduce((a,b) => calcPL(b)<calcPL(a)?b:a)   : null;
  const bigKoef  = ldrBets.length ? ldrBets.reduce((a,b) => (b.koef||0)>(a.koef||0)?b:a) : null;

  function HCard({ label, b, val, color }) {
    if (!b) return null;
    const pc = PLAYER_COLOR[b.player] || { bg:"#f5f5f3", color:"#888" };
    return (
      <div style={{ flex:1, minWidth:130, background:"#fff", border:"0.5px solid #e0ddd5", borderRadius:9, padding:"9px 11px" }}>
        <div style={{ fontSize:10, color:"#aaa", marginBottom:3, textTransform:"uppercase", letterSpacing:.5 }}>{label}</div>
        <div style={{ fontSize:16, fontWeight:700, color, marginBottom:2 }}>{val}</div>
        <div style={{ fontSize:12, fontWeight:600, marginBottom:3 }}>{b.game||b.bet||"—"}</div>
        <span style={{ padding:"1px 6px", borderRadius:6, background:pc.bg, color:pc.color, fontWeight:600, fontSize:11 }}>{b.player}</span>
      </div>
    );
  }

  return (
    <>
      <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginBottom:12 }}>
        {ldrDays.map(d => {
          const sel = d === ldrDay;
          return <button key={d} onClick={() => setLdrDay(d)} style={{ padding:"4px 10px", borderRadius:16, fontSize:11, border:"0.5px solid #ccc", cursor:"pointer", background:sel?"#1a1a18":"#fff", color:sel?"#fff":"#666", fontWeight:sel?700:400, whiteSpace:"nowrap", marginBottom:4 }}>{d.includes("Long-term")?"📌 Long-term":d}</button>;
        })}
      </div>

      <div style={{ overflowX:"auto", borderRadius:10, border:"0.5px solid #e0ddd5", marginBottom:".9rem" }}>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
          <thead>
            <tr style={{ background:"#f7f6f3" }}>
              {["Spēlētājs","Likmes","W","L","Win%","P/L","Ieguldīts","Max win","Max loss","Max koef"].map((h,i) => (
                <th key={h} style={{ ...thS, textAlign:i===0?"left":"right", paddingLeft:i===0?8:undefined }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {data.players.map(p => <StatRow key={p} p={p} s={pst[p]} />)}
            <StatRow p="Kopā" s={tot} isTotal />
          </tbody>
        </table>
      </div>

      {(bigWin||bigLoss||bigKoef) && (
        <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:".9rem" }}>
          <HCard label="Lielākais win"  b={bigWin}  val={bigWin?"+"+calcPL(bigWin).toFixed(2)+"€":""} color="#085041" />
          <HCard label="Lielākais loss" b={bigLoss} val={bigLoss?calcPL(bigLoss).toFixed(2)+"€":""} color="#791F1F" />
          <HCard label="Augstākais koef" b={bigKoef} val={bigKoef?(bigKoef.koef||0).toFixed(2):""} color="#1a1a18" />
        </div>
      )}
    </>
  );
}

function App() {
  const init = todayDay();
  const [data,    setData]    = useState(DEFAULT);
  const [tab,     setTab]     = useState("diena");
  const [me,      setMe]      = useState(() => localStorage.getItem("toto_me") || "Gačo");
  const [curDay,  setCurDay]  = useState(init);
  const [curPl,   setCurPl]   = useState("Visi");
  const [lb,      setLb]      = useState(null);
  const [toast,   setToast]   = useState("");
  // form
  const [apl,    setApl]    = useState(me);
  const [ady,    setAdy]    = useState(init);
  const [agame,  setAgame]  = useState("");
  const [abet,   setAbet]   = useState("");
  const [asum,   setAsum]   = useState("");
  const [akoef,  setAkoef]  = useState("");
  const [ast,    setAst]    = useState("Atvērts");
  const [imgs,   setImgs]   = useState([]);
  const [aiTxt,  setAiTxt]  = useState("");
  const [aiLoad, setAiLoad] = useState(false);
  const [editIdx,setEditIdx]= useState(null);
  const [saveOk, setSaveOk] = useState(false);
  // cfg
  const [newP,     setNewP]     = useState("");
  const [showAddP, setShowAddP] = useState(false);
  const [ldrDay, setLdrDay] = useState("Kopējais");
  const fileRef = useRef();
  const importRef = useRef();

  const PROXY = "https://toto-proxy.onrender.com";

  function showToast(m) { setToast(m); setTimeout(()=>setToast(""),2200); }

  async function persist(d) {
    try {
      localStorage.setItem(KEY, JSON.stringify(d));
      await fetch(PROXY+"/data", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(d)});
      showToast("✓ Saglabāts");
    } catch { showToast("! Kļūda"); }
  }
  function upd(d) { setData(d); persist(d); }

  useEffect(() => {
    async function loadData() {
      try {
        const r = await fetch(PROXY+"/data");
        const d = await r.json();
        if (d && d.bets) { setData({...d, days:IIHF_DAYS}); return; }
      } catch {}
      try { const r=localStorage.getItem(KEY); if(r){ const d=JSON.parse(r); setData({...d,days:IIHF_DAYS}); } } catch {}
    }
    loadData();
    const iv = setInterval(async()=>{
      try {
        const r = await fetch(PROXY+"/data");
        const d = await r.json();
        if(d && d.bets) setData(prev => JSON.stringify(prev.bets)===JSON.stringify(d.bets)?prev:{...d,days:IIHF_DAYS});
      } catch {}
    }, 15000);
    return () => clearInterval(iv);
  }, []);


  function exportData() {
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'toto2026.json'; a.click();
    URL.revokeObjectURL(url);
  }

  function importData(file) {
    const r = new FileReader();
    r.onload = e => {
      try {
        const d = JSON.parse(e.target.result);
        if (d.bets && d.players) { setData({...DEFAULT, ...d}); showToast('✓ Importēts'); }
        else showToast('! Nederīgs fails');
      } catch { showToast('! Kļūda'); }
    };
    r.readAsText(file);
  }
  function readFiles(files) {
    Array.from(files).forEach(f => {
      const r = new FileReader();
      r.onload = e => { const img={data:e.target.result,type:f.type||"image/jpeg"}; setImgs(prev=>{const n=[...prev,img];runAI(n);return n;}); };
      r.readAsDataURL(f);
    });
  }

  async function runAI(imgList) {
    setAiLoad(true); setAiTxt("AI nolasa...");
    try {
      const content = [{ type:"text", text:"Šis ir bukmeikera likmju screenshot (OlyBet vai Optibet).\nISO kodi: Čehija=CZE, Dānija=DEN, ASV=USA, Šveice=SUI, Zviedrija=SWE, Latvija=LAT, Kanāda=CAN, Somija=FIN, Vācija=GER, Norvēģija=NOR, Slovākija=SVK, Austrija=AUT, GBR, ITA, HUN.\nLikmes veidi: Mačs 1=mājas uzvar, Mačs 2=viesi uzvar, Vairāk=Over, Mazāk=Under.\nJa kombinētā - atdala ar +.\nAtbildi TIKAI 4 rindas:\nMačs: <ISO vs ISO>\nLikme: <īsi, piem. SUI Over 2.5 + CZE uzvar>\nSumma: <skaitlis>\nKoeficients: <skaitlis>" }];
      imgList.forEach(img => content.push({ type:"image", source:{ type:"base64", media_type:img.type, data:img.data.split(",")[1] } }));
      const resp = await fetch("https://toto-proxy.onrender.com/ai", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({ model:"claude-sonnet-4-5", max_tokens:200, messages:[{role:"user",content}] }),
      });
      const d = await resp.json();
      if (!resp.ok) { setAiTxt("API kļūda: "+(d.error?.message||resp.status)); setAiLoad(false); return; }
      const txt = d.content?.find(c=>c.type==="text")?.text||"";
      setAiTxt(txt);
      const gm=txt.match(/Mačs:\s*(.+)/i);    if(gm) setAgame(gm[1].trim());
      const bm=txt.match(/Likme:\s*(.+)/i);     if(bm) setAbet(bm[1].trim());
      const sm=txt.match(/Summa:\s*([\d.,]+)/i);    if(sm) setAsum(String(parseFloat(sm[1].replace(",","."))));
      const km=txt.match(/Koeficients:\s*([\d.,]+)/i); if(km) setAkoef(String(parseFloat(km[1].replace(",","."))));
    } catch(e) { setAiTxt("Kļūda: "+e.message); }
    setAiLoad(false);
  }

  function saveBet() {
    const game = agame.trim(); const bet = abet.trim();
    const sum = parseFloat(asum); const koef = parseFloat(akoef);
    if (!game && !bet) { alert("Ievadi mača nosaukumu vai likmi!"); return; }
    if (!sum || sum <= 0) { alert("Ievadi summu!"); return; }
    if (!koef || koef <= 1) { alert("Ievadi koeficientu (>1)!"); return; }
    const obj = { player:apl, day:ady, game, bet, sum, koef, status:ast, imgs:imgs.map(i=>i.data), ts:Date.now() };
    const bets = editIdx!==null ? data.bets.map((b,i)=>i===editIdx?obj:b) : [...data.bets,obj];
    upd({...data,bets}); setEditIdx(null);
    setSaveOk(true); setTimeout(()=>setSaveOk(false),2000);
    clearForm();
  }
  function clearForm() { setAgame(""); setAbet(""); setAsum(""); setAkoef(""); setAst("Atvērts"); setImgs([]); setAiTxt(""); setEditIdx(null); if(fileRef.current) fileRef.current.value=""; }
  function editBet(idx) { const b=data.bets[idx]; setEditIdx(idx); setApl(b.player); setAdy(b.day); setAgame(b.game||""); setAbet(b.bet||""); setAsum(String(b.sum||"")); setAkoef(String(b.koef||"")); setAst(b.status); setImgs(b.imgs?b.imgs.map(d=>({data:d,type:"image/jpeg"})):[]); setAiTxt(""); setTab("add"); }
  function delBet(idx) { upd({...data,bets:data.bets.filter((_,i)=>i!==idx)}); }
  function quickSt(idx,status) { upd({...data,bets:data.bets.map((b,i)=>i===idx?{...b,status}:b)}); }

  // stats
  const st={}; data.players.forEach(p=>{st[p]={pl:0,w:0,l:0,n:0,live:0,si:0};});
  data.bets.forEach(b=>{ if(!st[b.player])return; const p=calcPL(b); st[b.player].pl+=p; st[b.player].si+=b.sum||0; st[b.player].n++; if(p>0)st[b.player].w++; else if(p<0)st[b.player].l++; if(isLive(b.status))st[b.player].live++; });
  const sorted = [...data.players].sort((a,b)=>st[b].pl-st[a].pl);
  const maxAbs = Math.max(...sorted.map(p=>Math.abs(st[p].pl)),0.01);
  const totPL  = Object.values(st).reduce((a,s)=>a+s.pl,0);
  const totN   = Object.values(st).reduce((a,s)=>a+s.n,0);
  const totW   = Object.values(st).reduce((a,s)=>a+s.w,0);
  const dayBets = data.bets.filter(b=>b.day===curDay&&(curPl==="Visi"||b.player===curPl));
  const dayPL   = dayBets.reduce((a,b)=>a+calcPL(b),0);

  function BetRows({ bets }) {
    return (
      <div style={card}>
        {[...bets].reverse().map((b,ri)=>{
          const idx=data.bets.indexOf(b); const p2=calcPL(b);
          return (
            <div key={b.ts||ri} style={{ padding:"9px 0", borderTop:ri?"0.5px solid #e0ddd5":"none" }}>
              <div style={{ display:"flex", alignItems:"flex-start", gap:9 }}>
                <div style={{ flex:1 }}>
                  <div style={{ display:"flex", alignItems:"baseline", gap:6, marginBottom:1 }}>
                    <div style={{ fontSize:14, fontWeight:700 }}>{b.game||(b.bet?b.bet.split('\n')[0]:"—")}</div>
                    {(() => { const pc = PLAYER_COLOR[b.player]||{bg:"#f5f5f3",color:"#888"}; return <span style={{ fontSize:11, fontWeight:600, background:pc.bg, color:pc.color, padding:"2px 7px", borderRadius:8, flexShrink:0 }}>{b.player}</span>; })()}
                  </div>
                  {b.bet&&b.game&&<div style={{ fontSize:12, color:"#555", marginBottom:4 }}>{b.bet}</div>}
                  <div style={{ display:"flex", gap:5, flexWrap:"wrap", alignItems:"center" }}>
                    <Badge s={b.status}/>
                    {isLive(b.status)&&<span style={{ padding:"2px 7px", borderRadius:10, fontSize:11, fontWeight:600, background:"#FAEEDA", color:"#633806", border:"0.5px solid #EF9F27" }}>Live</span>}
                    <span style={{ fontSize:11, color:"#bbb" }}>{b.sum||0}€ @ {b.koef||"—"}</span>
                  </div>
                </div>
                <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:5 }}>
                  <div style={{ fontSize:15, fontWeight:700, color:p2>0?"#0a6644":p2<0?"#991f1f":"#888" }}>{p2>0?"+":""}{p2.toFixed(2)}€</div>
                  <div style={{ display:"flex", gap:3 }}>
                    <button onClick={()=>quickSt(idx,"Uzvarēts")} style={{ padding:"2px 7px", fontSize:12, borderRadius:6, border:"0.5px solid #c8edda", background:"transparent", color:"#085041", cursor:"pointer" }}>✓</button>
                    <button onClick={()=>quickSt(idx,"Zaudēts")}  style={{ padding:"2px 7px", fontSize:12, borderRadius:6, border:"0.5px solid #f2b8b8", background:"transparent", color:"#791F1F", cursor:"pointer" }}>✗</button>
                    <button onClick={()=>editBet(idx)} style={{ padding:"2px 7px", fontSize:12, borderRadius:6, border:"0.5px solid #ccc", background:"transparent", color:"#1a1a18", cursor:"pointer" }}>✏</button>
                    <button onClick={()=>delBet(idx)}  style={{ padding:"2px 7px", fontSize:12, borderRadius:6, border:"0.5px solid #f2b8b8", background:"transparent", color:"#991f1f", cursor:"pointer" }}>🗑</button>
                  </div>
                </div>
              </div>
              {b.imgs?.length>0&&<div style={{ marginTop:5 }}>{b.imgs.map((img,ii)=><img key={ii} src={img} onClick={()=>setLb(img)} alt="ss" style={{ width:50, height:36, objectFit:"cover", borderRadius:4, border:"0.5px solid #e0ddd5", cursor:"pointer", marginRight:4, marginTop:3 }}/>)}</div>}
            </div>
          );
        })}
      </div>
    );
  }

  const todayLabel = todayDay();
  const navItems = [["diena","Šodienas likmes"],["add","+ Likme"],["leader","Leaderboard"],["cfg","⚙"]];

  return (
    <div style={{ fontFamily:"system-ui,sans-serif", color:"#1a1a18", maxWidth:700, padding:"0.5rem 1rem" }}>
      {lb&&<div onClick={()=>setLb(null)} style={{ position:"fixed",top:0,left:0,width:"100%",height:"100%",background:"rgba(0,0,0,.82)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:20 }}><img src={lb} alt="ss" style={{ maxWidth:"100%",maxHeight:"90vh",borderRadius:4 }}/></div>}
      {toast&&<div style={{ position:"fixed",bottom:10,right:10,fontSize:11,padding:"5px 10px",borderRadius:7,background:"#fff",border:"0.5px solid #e0ddd5",zIndex:999 }}>{toast}</div>}

      <div style={{ display:"flex", borderBottom:"1px solid #e0ddd5", marginBottom:"1.2rem" }}>
        {navItems.map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{ padding:"7px 13px", fontSize:13, whiteSpace:"nowrap", background:"none", border:"none", borderBottom:tab===k?"2px solid #1a1a18":"2px solid transparent", cursor:"pointer", color:tab===k?"#1a1a18":"#888", fontWeight:tab===k?700:400, marginBottom:-1 }}>{l}</button>
        ))}
      </div>

      {/* ── ŠODIENAS LIKMES ── */}
      {tab==="diena"&&<>
        {/* dienu josla */}
        <div style={{ marginBottom:10 }}>
          <div style={{ display:"flex", flexWrap:"wrap", marginBottom:8 }}>
            {IIHF_DAYS.map(d=>{
              const isToday=d===todayLabel; const sel=d===curDay;
              return <button key={d} onClick={()=>setCurDay(d)} style={{ padding:"4px 10px", borderRadius:16, fontSize:11, border:"0.5px solid "+(isToday&&!sel?"#90c9f0":"#ccc"), cursor:"pointer", marginRight:4, marginBottom:4, whiteSpace:"nowrap", background:sel?"#1a1a18":isToday?"#EFF8FF":"#fff", color:sel?"#fff":isToday?"#0a5e99":"#666", fontWeight:(isToday||sel)?600:400 }}>{d.includes("Long-term")?"📌 Long-term":d}</button>;
            })}
          </div>
          <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
            {["Visi", ...data.players].map(p=>{ const pc=PLAYER_COLOR[p]; const sel=p===curPl; return (
              <button key={p} onClick={()=>setCurPl(p)} style={{ padding:"4px 11px", borderRadius:16, fontSize:12, border:"0.5px solid "+(pc&&!sel?pc.bg:"#ccc"), cursor:"pointer", marginBottom:4, background:sel?(pc?pc.bg:"#1a1a18"):(pc?pc.bg+"88":"#fff"), color:sel?(pc?pc.color:"#fff"):(pc?pc.color:"#888"), fontWeight:sel?700:500, opacity:sel?1:0.7 }}>{p}</button>
            );})}
          </div>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(90px,1fr))", gap:7, marginBottom:".9rem" }}>
          <Met label="P/L" val={(dayPL>=0?"+":"")+dayPL.toFixed(2)+"€"} color={dayPL>=0?"#0a6644":"#991f1f"}/>
          <Met label="W/L" val={`${dayBets.filter(b=>calcPL(b)>0).length}/${dayBets.filter(b=>calcPL(b)<0).length}`}/>
          <Met label="Atvērti" val={dayBets.filter(b=>b.status==="Atvērts").length}/>
          <Met label="Ieguldīts" val={dayBets.reduce((a,b)=>a+(b.sum||0),0).toFixed(0)+"€"}/>
        </div>
        {!dayBets.length?<div style={{ color:"#888", fontSize:13 }}>Nav likmes. Nospied "+ Likme".</div>:<BetRows bets={dayBets}/>}
      </>}

      {/* ── JAUNA LIKME ── */}
      {tab==="add"&&(
        <div style={card}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:9 }}>
            <div><label style={{ fontSize:12, color:"#888", display:"block", marginBottom:3 }}>Spēlētājs</label><select value={apl} onChange={e=>setApl(e.target.value)} style={inp}>{data.players.map(p=><option key={p}>{p}</option>)}</select></div>
            <div><label style={{ fontSize:12, color:"#888", display:"block", marginBottom:3 }}>Diena</label><select value={ady} onChange={e=>setAdy(e.target.value)} style={inp}>{IIHF_DAYS.map(d=><option key={d}>{d}</option>)}</select></div>
          </div>
          <div style={{ marginBottom:9 }}>
            <label style={{ fontSize:12, color:"#888", display:"block", marginBottom:3 }}>Screenshot (optional) — AI nolasīs automātiski</label>
            <div onClick={()=>fileRef.current.click()} onDrop={e=>{e.preventDefault();readFiles(e.dataTransfer.files);}} onDragOver={e=>e.preventDefault()} style={{ border:"1.5px dashed #ccc", borderRadius:8, padding:"12px", textAlign:"center", cursor:"pointer", fontSize:13, color:"#888", marginBottom:7 }}>↑ Nospied vai ievelc attēlu šeit</div>
            <input ref={fileRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>readFiles(e.target.files)}/>
            {imgs.length>0&&<div style={{ display:"flex", gap:7, flexWrap:"wrap", marginBottom:7 }}>{imgs.map((img,i)=><div key={i} style={{ position:"relative" }}><img src={img.data} alt="prev" style={{ width:64, height:46, objectFit:"cover", borderRadius:4, border:"0.5px solid #e0ddd5" }}/><button onClick={()=>setImgs(imgs.filter((_,j)=>j!==i))} style={{ position:"absolute", top:-4, right:-4, width:15, height:15, borderRadius:"50%", background:"#991f1f", color:"#fff", border:"none", cursor:"pointer", fontSize:9, padding:0 }}>✕</button></div>)}</div>}
            {(aiLoad||aiTxt)&&<div style={{ background:"#f5f5f3", borderRadius:7, padding:"9px 11px", fontSize:12, whiteSpace:"pre-wrap", marginBottom:7, color:aiLoad?"#bbb":"#444", lineHeight:1.5 }}>{aiTxt||"AI nolasa..."}</div>}
          </div>
          <div style={{ marginBottom:9 }}><label style={{ fontSize:12, color:"#888", display:"block", marginBottom:3 }}>Spēle / notikums</label><input value={agame} onChange={e=>setAgame(e.target.value)} placeholder="CAN vs SWE" style={inp}/></div>
          <div style={{ marginBottom:9 }}><label style={{ fontSize:12, color:"#888", display:"block", marginBottom:3 }}>Likme</label><textarea value={abet} onChange={e=>setAbet(e.target.value)} placeholder="CAN uzvar..." style={{ ...inp, minHeight:48, resize:"vertical" }}/></div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:9 }}>
            <div><label style={{ fontSize:12, color:"#888", display:"block", marginBottom:3 }}>Summa (€)</label><input type="number" value={asum} onChange={e=>setAsum(e.target.value)} placeholder="5" step="0.01" style={inp}/></div>
            <div><label style={{ fontSize:12, color:"#888", display:"block", marginBottom:3 }}>Koeficients</label><input type="number" value={akoef} onChange={e=>setAkoef(e.target.value)} placeholder="2.00" step="0.01" style={inp}/></div>
          </div>
          <div style={{ marginBottom:12 }}>
            <label style={{ fontSize:12, color:"#888", display:"block", marginBottom:5 }}>Statuss</label>
            <div style={{ display:"flex", border:"0.5px solid #ccc", borderRadius:7, overflow:"hidden" }}>
              {["Atvērts","Uzvarēts","Zaudēts","Live ✓","Live ✗"].map((l,i)=>{
                const vals=["Atvērts","Uzvarēts","Zaudēts","Live uzvarēts","Live zaudēts"]; const v=vals[i]; const sel=ast===v;
                return <button key={v} onClick={()=>setAst(v)} style={{ flex:1, padding:"6px 2px", fontSize:11, border:"none", cursor:"pointer", fontWeight:sel?700:400, ...(sel?SS[v]:{background:"#fff",color:"#888"}) }}>{l}</button>;
              })}
            </div>
          </div>
          <div style={{ display:"flex", gap:7, alignItems:"center" }}>
            <Btn pri onClick={saveBet}>Saglabāt</Btn>
            <Btn onClick={clearForm}>Notīrīt</Btn>
            {saveOk&&<span style={{ fontSize:12, color:"#0a6644" }}>✓ Saglabāts</span>}
          </div>
        </div>
      )}

      {/* ── LEADERBOARD ── */}
      {tab==="leader" && <Leaderboard data={data} ldrDay={ldrDay} setLdrDay={setLdrDay} />}

      {/* ── IESTATĪJUMI ── */}
      {tab==="cfg"&&<>
        <div style={card}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:9 }}><span style={{ fontWeight:700 }}>Spēlētāji</span><Btn sm onClick={()=>setShowAddP(!showAddP)}>+ Pievienot</Btn></div>
          {data.players.map((p,i)=>(
            <div key={p} style={{ display:"flex", alignItems:"center", gap:7, padding:"5px 0", borderTop:i?"0.5px solid #e0ddd5":"none" }}>
              <span style={{ flex:1, fontSize:14 }}>{p}</span>
              {data.players.length>1&&<Btn sm red onClick={()=>{if(!confirm("Dzēst "+p+"?"))return;upd({...data,players:data.players.filter(x=>x!==p)});}}>Dzēst</Btn>}
            </div>
          ))}
          {showAddP&&<div style={{ marginTop:9 }}>
            <input value={newP} onChange={e=>setNewP(e.target.value)} placeholder="Vārds" style={{ ...inp, marginBottom:7 }}/>
            <div style={{ display:"flex", gap:6 }}>
              <Btn sm pri onClick={()=>{if(!newP||data.players.includes(newP))return;upd({...data,players:[...data.players,newP]});setNewP("");setShowAddP(false);}}>Pievienot</Btn>
              <Btn sm onClick={()=>setShowAddP(false)}>Atcelt</Btn>
            </div>
          </div>}
        </div>
        <div style={card}>
          <div style={{ fontWeight:700, marginBottom:7 }}>Aktīvais spēlētājs (tu)</div>
          <select value={me} onChange={e=>{setMe(e.target.value);localStorage.setItem("toto_me",e.target.value);setCurPl(e.target.value);}} style={inp}>{data.players.map(p=><option key={p}>{p}</option>)}</select>
        </div>
        <div style={card}>
          <div style={{ fontWeight:700, marginBottom:9 }}>Dati</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:6}}>
            <Btn sm onClick={exportData}>⬇ Eksportēt JSON</Btn>
            <Btn sm onClick={()=>importRef.current.click()}>⬆ Importēt JSON</Btn>
          </div>
          <input ref={importRef} type="file" accept=".json" style={{display:'none'}} onChange={e=>{if(e.target.files[0])importData(e.target.files[0]);}} />
          <div style={{fontSize:11,color:'#aaa'}}>Eksportē visas likmes kā JSON failu. Importē lai atjaunotu no faila.</div>
        </div>
        <div style={{ ...card, borderColor:"#f2b8b8" }}>
          <div style={{ fontWeight:700, marginBottom:6, color:"#991f1f" }}>Bīstamā zona</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <Btn sm red onClick={()=>{ const nd={...DEFAULT, players:data.players}; setData(nd); try{localStorage.removeItem("toto26");}catch(e){} }}>Dzēst visas likmes</Btn>
            <Btn sm red onClick={()=>{if(!confirm("Pilnīgi notīrīt visu?"))return;try{localStorage.removeItem("toto26");}catch(e){}const fresh={...DEFAULT};setData(fresh);setTab("diena");}}>Notīrīt visu (reset)</Btn>
          </div>
        </div>
      </>}
    </div>
  );
}

const domRoot = document.getElementById('root');
const root = ReactDOM.createRoot(domRoot);
root.render(React.createElement(App));
</script>
</body>
</html>
